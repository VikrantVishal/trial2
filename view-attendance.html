<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1">
<title>View Attendance — Deposit-11C</title>
<link href="https://fonts.googleapis.com/css2?family=Rajdhani:wght@500;600;700&family=Share+Tech+Mono&family=Noto+Sans:wght@400;600&display=swap" rel="stylesheet">
<link rel="stylesheet" href="style.css">
<script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
</head>
<body>

<header class="app-header">
  <div class="header-top">
    <div class="titles">
      <h1>View Attendance</h1>
      <div class="sub">Daily &amp; monthly records</div>
    </div>
  </div>
  <div class="header-bottom">
    <a class="back-btn" href="main-menu.html">← Main Menu</a>
    <div class="user-badge" id="userBadge"></div>
  </div>
</header>

<div class="page">

  <div class="btn-row no-print" style="margin-bottom:14px;">
    <button class="btn-amber btn-sm" id="tabDaily">Part A — Daily</button>
    <button class="btn-outline btn-sm" id="tabMonthly">Part B — Monthly / Range</button>
  </div>

  <!-- ===================== PART A: DAILY ===================== -->
  <div id="dailyView">
    <div class="card no-print">
      <h2>Daily Attendance</h2>
      <div class="field-row two">
        <div><label>Date</label><input type="date" id="dDate"></div>
        <div><label>Shift</label>
          <select id="dShift">
            <option value="first">1st Shift</option>
            <option value="second">2nd Shift</option>
            <option value="night">Night Shift</option>
          </select>
        </div>
      </div>
      <div class="btn-row"><button class="btn-amber" id="dLoadBtn">Load</button><button class="btn-outline" id="dPrintBtn">Print</button></div>
    </div>
    <div id="dailyResult"></div>
  </div>

  <!-- ===================== PART B: MONTHLY/RANGE ===================== -->
<div id="monthlyView" style="display:none;">
  <div class="card no-print">
    <h2>Monthly / Date Range Attendance</h2>
    
    <!-- Combined into a single row with a custom class -->
    <div class="field-row monthly-filter-row">
      <div>
        <label>Mode</label>
        <select id="mMode">
          <option value="month">Month</option>
          <option value="range">Date Range</option>
        </select>
      </div>
      <div id="mMonthField"><label>Month</label><input type="month" id="mMonth"></div>
      <div id="mRangeField" class="date-range-pair" style="display:none;">
        <div><label>From</label><input type="date" id="mFrom"></div>
        <div><label>To</label><input type="date" id="mTo"></div>
      </div>
      <div><label>Group</label><select id="mGroup"><option value="">All Groups</option></select></div>
    </div>
    
    <div class="btn-row" style="margin-top: 12px;">
      <button class="btn-amber" id="mLoadBtn">Load</button>
      <button class="btn-outline" id="mPrintBtn">Print</button>
    </div>
  </div>
  <div id="monthlyResult"></div>
</div>
</div>

<div id="toastHost"></div>

<script type="module">
import {
  db, collection, doc, getDoc, getDocs, query, where, orderBy,
  SHIFTS, OTHER_STATUS_OPTIONS, STATUS_COLORS, sortGroups, groupSortIndex,
  todayStr, formatDateLong, attendanceDocId, esc,
  fetchDutyChartWorkbook, getDutyChartMapping, saveDutyChartMapping, autoDetectDateColumns,
  classifyShiftCode, DEFAULT_SHIFT_CODES, excelSerialToDateStr
} from "./firebase-config.js";
import { requireAuth, renderUserBadge } from "./auth.js";

const session = requireAuth();
if (session) {
  renderUserBadge('userBadge');
  initViewAttendancePage();
}

function initViewAttendancePage() {

function toast(msg,ms=3200){const t=document.createElement('div');t.className='toast';t.textContent=msg;document.getElementById('toastHost').appendChild(t);setTimeout(()=>t.remove(),ms);}

document.getElementById('dDate').value = todayStr();
document.getElementById('mMonth').value = todayStr().slice(0,7);

// tabs
document.getElementById('tabDaily').addEventListener('click', () => switchTab('daily'));
document.getElementById('tabMonthly').addEventListener('click', () => switchTab('monthly'));
function switchTab(which) {
  document.getElementById('dailyView').style.display = which==='daily' ? 'block' : 'none';
  document.getElementById('monthlyView').style.display = which==='monthly' ? 'block' : 'none';
  document.getElementById('tabDaily').className = which==='daily' ? 'btn-amber btn-sm' : 'btn-outline btn-sm';
  document.getElementById('tabMonthly').className = which==='monthly' ? 'btn-amber btn-sm' : 'btn-outline btn-sm';
  if (which==='monthly') loadGroupOptions();
}

document.getElementById('dPrintBtn').addEventListener('click', () => window.print());
document.getElementById('mPrintBtn').addEventListener('click', () => window.print());

// ============================================================
// Duty chart lookup (for placing Leave/Tour/PME/etc. records into
// the correct shift column in the Monthly view — cached after the
// first successful load so repeat "Load" clicks are instant).
// ============================================================
let dutyByEmpDate = null; // empId -> { dateStr -> 'first'|'second'|'night'|'other'|null }
let dutyChartLoadFailed = false;
let dutyChartLoadFailReason = ''; // shown in a banner so this never fails silently

async function ensureDutyChartLoaded() {
  if (dutyByEmpDate || dutyChartLoadFailed) return;
  try {
    let mapping = getDutyChartMapping();
    let workbook = await fetchDutyChartWorkbook();

    if (!mapping.sheetName || mapping.idCol === null || mapping.idCol === undefined) {
      // No saved mapping on this browser (localStorage is per-device, so a
      // mapping configured via Mark Attendance on a different browser/profile
      // won't be here). Auto-configure the same way Mark Attendance does on
      // its first run, rather than silently giving up.
      const sheetName = workbook.SheetNames[0];
      const ws0 = workbook.Sheets[sheetName];
      const headerRows = XLSX.utils.sheet_to_json(ws0, { header: 1, raw: true, defval: "" });
      const headers0 = headerRows[0] || [];
      let guesses = { id: 0, name: 0, group: 0 };
      headers0.forEach((h, c) => {
        const low = String(h || "").toLowerCase();
        if (low.includes("emp") && low.includes("id")) guesses.id = c;
        if (low.includes("name")) guesses.name = c;
        if (low.includes("group") || low.includes("gang")) guesses.group = c;
      });
      mapping = { sheetName, headerRow: 1, idCol: guesses.id, nameCol: guesses.name, groupCol: guesses.group, shiftCodes: DEFAULT_SHIFT_CODES };
      saveDutyChartMapping(mapping);
    }

    const ws = workbook.Sheets[mapping.sheetName];
    const sheetRows = XLSX.utils.sheet_to_json(ws, { header: 1, raw: true, defval: "" });
    const headerRow = (mapping.headerRow || 1) - 1;
    const headers = sheetRows[headerRow] || [];
    const dateColMap = autoDetectDateColumns(headers, 0); // colIndex -> dateStr

    dutyByEmpDate = {};
    for (let r = headerRow + 1; r < sheetRows.length; r++) {
      const row = sheetRows[r];
      if (!row || row.length === 0) continue;
      const name = String(row[mapping.nameCol] ?? "").trim();
      if (!name) continue;
      let id = String(row[mapping.idCol] ?? "").trim();
      if (!id) id = name.toUpperCase().replace(/\s+/g, "_");
      const byDate = {};
      Object.entries(dateColMap).forEach(([col, ds]) => {
        let cellRawValue = row[parseInt(col, 10)];
        
        // If the cell contains an Excel date serial code instead of a shift string
        if (typeof cellRawValue === "number" && cellRawValue > 30000 && cellRawValue < 80000) {
          // Convert it cleanly to an ISO string formatting match
          cellRawValue = excelSerialToDateStr(cellRawValue);
        }
        
        byDate[ds] = classifyShiftCode(cellRawValue, mapping.shiftCodes || DEFAULT_SHIFT_CODES);
      });
      dutyByEmpDate[id] = byDate;
    }

    if (Object.keys(dateColMap).length === 0) {
      // Loaded fine, but no date columns were detected — mapping is almost
      // certainly wrong for this sheet. Surface it instead of staying quiet.
      dutyChartLoadFailed = true;
      dutyChartLoadFailReason = 'Duty chart loaded, but no date columns were detected — check ⚙ Configure Duty Chart Mapping in Mark Attendance.';
      dutyByEmpDate = null;
    }
  } catch (e) {
    console.warn("Duty chart load failed — leave/tour records will not be placed into shift columns:", e);
    dutyChartLoadFailed = true;
    dutyChartLoadFailReason = 'Could not load the Duty Chart (' + e.message + ') — Leave/Tour/Training records will not appear in the shift grid until this is resolved.';
  }
}

// Returns 'first' | 'second' | 'night' if the duty roster assigns the
// employee to one of those shifts on dateStr, otherwise null (covers
// Rest days, unrecognised codes, and dates outside the duty chart —
// there is no Rest column in this table, so those are left unmarked).
function getDutyShift(empId, dateStr) {
  if (!dutyByEmpDate) return null;
  
  // Normalize the search ID key lookup signature
  const cleanId = String(empId ?? "").trim();
  const rec = dutyByEmpDate[cleanId];
  if (!rec) return null;
  
  const shiftKey = rec[dateStr];
  if (shiftKey === 'first' || shiftKey === 'second' || shiftKey === 'night' || shiftKey === 'rest') {
    return shiftKey;
  }
  return null;
}

// ================= PART A =================
document.getElementById('dLoadBtn').addEventListener('click', async () => {
  const dateStr = document.getElementById('dDate').value;
  const shiftKey = document.getElementById('dShift').value;
  const host = document.getElementById('dailyResult');
  host.innerHTML = `<div class="loader"><div class="spinner"></div> Loading...</div>`;
  try {
    const snap = await getDoc(doc(db, "attendance", attendanceDocId(dateStr, shiftKey)));
    if (!snap.exists()) {
      host.innerHTML = `<div class="card"><div class="empty-state">No attendance submitted yet for ${esc(formatDateLong(dateStr))} · ${esc(SHIFTS[shiftKey].label)}.</div></div>`;
      return;
    }
    const data = snap.data();
    const groups = {};
    Object.entries(data.entries || {}).forEach(([id, e]) => { (groups[e.group||'Unassigned']=groups[e.group||'Unassigned']||[]).push({id,...e}); });
    const otByGroup = {};
    Object.entries(data.otEntries || {}).forEach(([id, e]) => { (otByGroup[e.group||'Unassigned']=otByGroup[e.group||'Unassigned']||[]).push({id,...e}); });
    const allGroupNames = sortGroups(Array.from(new Set([...Object.keys(groups), ...Object.keys(otByGroup)])));

// Replace the start of your generated HTML string inside the dLoadBtn event listener:
let html = `<div class="card">
  <div class="daily-sticky-hdr">
    <h2>${esc(formatDateLong(dateStr))} · ${esc(SHIFTS[shiftKey].label)}</h2>
    <p class="mono" style="color:var(--text-mid); font-size:0.8rem; margin-bottom:0;">
      Submitted by <strong style="color:var(--text-hi);">${esc(data.submittedBy||'—')}</strong>
      ${data.lastEditedBy && data.lastEditedBy!==data.submittedBy ? ` · Last edited by ${esc(data.lastEditedBy)}` : ''}
    </p>
  </div>`;
  
    allGroupNames.forEach(g => {
      const normalList = groups[g] || [];
      const otList = otByGroup[g] || [];
      html += `<div class="group-title">${esc(g)}</div>`;
      normalList.sort((a,b)=>a.name.localeCompare(b.name)).forEach(e => {
        const color = STATUS_COLORS[e.status] || '#9aa5b1';
        html += `<div class="emp-row"><div class="emp-name"><span class="id">${esc(e.id)}</span>${esc(e.name)}</div><span class="pill" style="background:${color};">${esc(e.status||'Not marked')}</span></div>`;
      });
      otList.sort((a,b)=>a.name.localeCompare(b.name)).forEach(e => {
        html += `<div class="emp-row"><div class="emp-name"><span class="id">${esc(e.id)}</span>${esc(e.name)} <span class="locked-tag">(OT)</span></div><span class="pill" style="background:${STATUS_COLORS.OT};">Present in OT</span></div>`;
      });
    });
    if (data.comments) html += `<div class="group-title">Comments</div><p style="color:var(--text-mid); font-size:0.85rem;">${esc(data.comments)}</p>`;
    html += `</div>`;
    host.innerHTML = html;
  } catch (e) {
    host.innerHTML = `<div class="card"><div class="empty-state" style="color:var(--red);">Error: ${esc(e.message)}</div></div>`;
  }
});

// ================= PART B =================
document.getElementById('mMode').addEventListener('change', (e) => {
  const isRange = e.target.value === 'range';
  document.getElementById('mMonthField').style.display = isRange ? 'none' : 'block';
  document.getElementById('mRangeField').style.display = isRange ? 'grid' : 'none';
});

async function loadGroupOptions() {
  const sel = document.getElementById('mGroup');
  if (sel.dataset.loaded) return;
  try {
    const snap = await getDocs(collection(db, "employees"));
    const groups = new Set();
    snap.forEach(d => groups.add(d.data().group || 'Unassigned'));
    sortGroups(Array.from(groups)).forEach(g => sel.insertAdjacentHTML('beforeend', `<option value="${esc(g)}">${esc(g)}</option>`));
    sel.dataset.loaded = "1";
  } catch(e) { console.warn(e); }
}

const TOTAL_STATUSES = ["Present", "Present (Mutual)", "Absent", "Absent (Mutual)", "OT","Personal Leave","Medical Leave","Official Tour","PME","Meeting","Official Work","Training","Others","Public Holiday","General Shift"];

document.getElementById('mLoadBtn').addEventListener('click', async () => {
  const mode = document.getElementById('mMode').value;
  let from, to;
  if (mode === 'month') {
    const m = document.getElementById('mMonth').value; // YYYY-MM
    if (!m) { toast('Select a month.'); return; }
    from = `${m}-01`;
    const [y, mo] = m.split('-').map(Number);
    const lastDay = new Date(y, mo, 0).getDate();
    to = `${m}-${String(lastDay).padStart(2,'0')}`;
  } else {
    from = document.getElementById('mFrom').value;
    to = document.getElementById('mTo').value;
    if (!from || !to) { toast('Select from and to dates.'); return; }
    if (from > to) {
      const msg = 'Invalid date range. "From Date" must be earlier than or equal to "To Date".';
      toast(msg, 5000);
      document.getElementById('monthlyResult').innerHTML =
        `<div class="card"><div class="empty-state" style="color:var(--red);">${esc(msg)}</div></div>`;
      return;
    }
  }
  const groupFilter = document.getElementById('mGroup').value;
  const host = document.getElementById('monthlyResult');
  host.innerHTML = `<div class="loader"><div class="spinner"></div> Loading records for ${esc(from)} → ${esc(to)}...</div>`;

  try {
    const q = query(collection(db, "attendance"), where("date", ">=", from), where("date", "<=", to), orderBy("date"));
    const snap = await getDocs(q);
    const docs = [];
    snap.forEach(d => docs.push(d.data()));

    // employee -> {group, dates: {date_shift: status}, totals:{}}
   const empSnap = await getDocs(collection(db, "employees"));
    const employees = {};
    empSnap.forEach(d => {
      const data = d.data();
      if ((data.group || '').trim().toUpperCase() === 'CASUAL LABOUR') return;
      if (groupFilter && (data.group||'Unassigned') !== groupFilter) return;
      
      // Enforce clean uppercase spacing criteria matching the Excel extraction rules
      const cleanEmpId = String(d.id ?? "").trim();
      employees[cleanEmpId] = { id: cleanEmpId, name: data.name, group: data.group || 'Unassigned', cells: {}, totals: {} };
    });

    const dateSet = new Set();
    docs.forEach(docData => {
      dateSet.add(docData.date);
      Object.entries(docData.entries || {}).forEach(([rawEmpId, e]) => {
        // Trim defensively — a stray leading/trailing space (or case
        // difference) in a stored attendance entry's key would otherwise
        // fail to match the trimmed employees[] index above, silently
        // dropping that employee's marks whenever a Group filter is set.
        const empId = String(rawEmpId ?? "").trim();
        if (!employees[empId]) {
          if (!groupFilter) employees[empId] = { id: empId, name: e.name, group: e.group || 'Unassigned', cells: {}, totals: {} };
          else return;
        }
        employees[empId].cells[`${docData.date}_${docData.shift}`] = e.status || '';
        const key = e.status || 'Unmarked';
        employees[empId].totals[key] = (employees[empId].totals[key]||0)+1;
      });
      Object.entries(docData.otEntries || {}).forEach(([rawEmpId, e]) => {
        const empId = String(rawEmpId ?? "").trim();
        if (!employees[empId]) {
          if (!groupFilter) employees[empId] = { id: empId, name: e.name, group: e.group || 'Unassigned', cells: {}, totals: {} };
          else return;
        }
        employees[empId].totals['OT'] = (employees[empId].totals['OT']||0)+1;
      });
    });

    // ---- Leave / Tour / PME / Meeting / Official Work overlay ----
    // Placed only into the shift column the duty roster assigns the
    // employee to on each date; never overwrites an actual submitted
    // attendance entry.
    await ensureDutyChartLoaded();
    try {
      const leaveSnap = await getDocs(collection(db, "leaveRecords"));
      const leaveRecords = [];
      leaveSnap.forEach(d => leaveRecords.push(d.data()));

      leaveRecords.forEach(rec => {
        const recFrom = rec.fromDate || rec.singleDate;
        const recTo = rec.toDate || rec.singleDate;
        if (!recFrom || !recTo) return;
        if (!(recFrom <= to && recTo >= from)) return; // no overlap with requested range
        if ((rec.group || '').trim().toUpperCase() === 'CASUAL LABOUR') return;
        if (groupFilter && (rec.group || 'Unassigned') !== groupFilter) return;

        const cleanRecEmpId = String(rec.employeeId ?? "").trim();
        if (!employees[cleanRecEmpId]) {
          if (groupFilter) return;
          employees[cleanRecEmpId] = { id: cleanRecEmpId, name: rec.employeeName, group: rec.group || 'Unassigned', cells: {}, totals: {} };
        }
        const emp = employees[cleanRecEmpId];

        const effFrom = recFrom > from ? recFrom : from;
        const effTo = recTo < to ? recTo : to;
        // UTC-safe day-by-day string arithmetic (avoids local-timezone
        // off-by-one issues when advancing a Date object).
         let dateStr = effFrom;
        while (dateStr <= effTo) {
          dateSet.add(dateStr); 
          const shiftKey = getDutyShift(rec.employeeId, dateStr);

          // The day always counts toward the employee's leave/tour total,
          // whether or not the duty chart could resolve a specific shift
          // for it — a duty-chart load failure should degrade to "not
          // placed in a shift column" (see dutyChartLoadFailed banner),
          // not "this day of leave silently vanishes from the totals too."
          emp.totals[rec.reason] = (emp.totals[rec.reason] || 0) + 1;

          if (shiftKey && shiftKey !== 'rest') {
            const cellKey = `${dateStr}_${shiftKey}`;
            if (!emp.cells[cellKey]) {
              emp.cells[cellKey] = rec.reason;
            }
          } else if (shiftKey === 'rest') {
            // Contextual processing for structural leave intersecting a planned rest day.
            // Saved into cell dictionary framework without breaking standard layout boundaries.
            const restCellKey = `${dateStr}_rest`;
            emp.cells[restCellKey] = rec.reason;
          }
          
          const [y, m, dd] = dateStr.split('-').map(Number);
          const next = new Date(Date.UTC(y, m - 1, dd + 1));
          dateStr = `${next.getUTCFullYear()}-${String(next.getUTCMonth() + 1).padStart(2, '0')}-${String(next.getUTCDate()).padStart(2, '0')}`;
        }
      });
    } catch (e) {
      console.warn("leaveRecords overlay failed:", e);
    }

    const dates = Array.from(dateSet).sort();
    const empList = Object.values(employees).sort((a,b) => {
      const ia = groupSortIndex(a.group), ib = groupSortIndex(b.group);
      if (ia !== ib) return ia - ib;
      if (a.group !== b.group) return String(a.group).localeCompare(String(b.group));
      return a.name.localeCompare(b.name);
    });

    if (empList.length === 0) {
      host.innerHTML = `<div class="card"><div class="empty-state">No attendance records found for this range.</div></div>`;
      return;
    }

    // Build header
    let thead = `<tr><th>Employee</th><th>Group</th>`;
    dates.forEach(d => { 
  // d is 'YYYY-MM-DD', so splitting by '-' gives ['YYYY', 'MM', 'DD']
  const [, mm, dd] = d.split('-');
  SHIFTS_ORDER.forEach(s => { 
    thead += `<th>${dd}-${mm}<br>${SHIFT_ABBR[s]}</th>`; 
  }); 
});
    TOTAL_STATUSES.forEach(s => thead += `<th>${esc(s)}</th>`);
    thead += `</tr>`;
    let tbody = '';
    const shiftTotals = {}; // shift -> status -> count
    SHIFTS_ORDER.forEach(s => shiftTotals[s] = {});

    empList.forEach(emp => {
      tbody += `<tr><td>${esc(emp.name)}<br><span class="mono" style="color:var(--text-lo); font-size:0.7rem;">${esc(emp.id)}</span></td><td>${esc(emp.group)}</td>`;
      dates.forEach(d => {
        SHIFTS_ORDER.forEach((s, idx) => {
          const st = emp.cells[`${d}_${s}`] || '';

          // Note: rest-day leave/tour records are intentionally NOT shown here.
          // getDutyShift() returns 'rest' for those dates, and the overlay above
          // stores them under `${date}_rest` (still counted in emp.totals), but
          // since this table has no dedicated Rest column, per spec they are
          // left unmarked in the shift grid rather than stamped into every
          // (empty) shift column for that date.

          if (st) {
            shiftTotals[s][st] = (shiftTotals[s][st]||0)+1;
          }
          
          const color = st ? (STATUS_COLORS[st] || '#9aa5b1') : 'transparent';
          const abbr = st ? (STATUS_ABBR[st] || st.slice(0,2)) : '·';
          tbody += `<td style="color:${st?'#0a0e14':'var(--text-lo)'}; background:${st?color:'transparent'}; text-align:center; font-weight:${st?'700':'400'};">${esc(abbr)}</td>`;
        });
      });
      TOTAL_STATUSES.forEach(s => { tbody += `<td style="text-align:center;">${emp.totals[s]||0}</td>`; });
      tbody += `</tr>`;
    });

    // shift-wise totals footer


    let statusFootRows = '';

 // Convert YYYY-MM-DD to DD-MM-YYYY for display
const displayFrom = from.split('-').reverse().join('-');
const displayTo = to.split('-').reverse().join('-');

const dutyWarningHtml = dutyChartLoadFailed
  ? `<div class="empty-state" style="color:var(--amber); text-align:left; border:1px solid var(--amber-dim); border-radius:var(--radius); padding:10px 14px; margin-bottom:14px;">
       ⚠️ ${esc(dutyChartLoadFailReason || 'Duty chart could not be loaded — Leave/Tour/PME/Training records will not appear in the shift grid below (their totals are still counted correctly on the right).')}
     </div>`
  : '';

host.innerHTML = `<div class="card">
  <h2>${esc(displayFrom)} → ${esc(displayTo)} ${groupFilter ? '· '+esc(groupFilter) : ''}</h2>
  ${dutyWarningHtml}
  <div class="table-scroll" style="max-height:70vh;">
    <table><thead>${thead}</thead><tbody>${tbody}${statusFootRows}</tbody></table>
  </div>
  ${buildLegendHtml()}
</div>`;
  } catch (e) {
    host.innerHTML = `<div class="card"><div class="empty-state" style="color:var(--red);">Error: ${esc(e.message)}. (If this is a missing-index error, Firestore will print a console link to auto-create the composite index.)</div></div>`;
    console.error(e);
  }
});

const SHIFTS_ORDER = ['first','second','night'];
const SHIFT_ABBR = { first: '1st', second: '2nd', night: 'Nt' };
const STATUS_ABBR = {
  'Present':'P','Absent':'A','Present (Mutual)':'PM','Absent (Mutual)':'AM',
  'Personal Leave':'PL','Medical Leave':'ML','Official Tour':'OFT','PME':'PME',
  'Meeting':'MT','Official Work':'OW','Training':'TR','Others':'OTR','Public Holiday':'PH','General Shift':'GS'
};

// ============================================================
// Legend — abbreviation chip + full label for every status that
// can appear inside the shift grid, styled to match the shift
// legend used elsewhere in the app (bordered chip in the status
// color + muted label text).
// ============================================================
function buildLegendHtml() {
  const chip = (abbr, label, color) => `
    <span style="display:inline-flex; align-items:center; gap:7px; margin:0 16px 10px 0;">
      <span style="display:inline-flex; align-items:center; justify-content:center; min-width:30px; padding:3px 7px; border:1px solid ${color}; border-radius:6px; color:${color}; font-family:'Share Tech Mono',monospace; font-size:0.72rem; font-weight:700; background:${color}22;">${esc(abbr)}</span>
      <span style="color:var(--text-mid); font-size:0.8rem;">${esc(label)}</span>
    </span>`;

  const chips = Object.entries(STATUS_ABBR)
    .map(([status, abbr]) => chip(abbr, status, STATUS_COLORS[status] || '#9aa5b1'))
    .join('');

  return `<div style="display:flex; flex-wrap:wrap; align-items:center; padding-top:14px; margin-top:14px; border-top:1px solid var(--line);">
      ${chip('·', 'Not Marked', '#6d7c8e')}
      ${chips}
    </div>
    <p style="color:var(--text-lo); font-size:0.72rem; margin:2px 0 0;">
    </p>`;
}

} // end initViewAttendancePage


</script>

</body>
</html>
