<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1">
<title>Login — Deposit-11C Attendance</title>
<link href="https://fonts.googleapis.com/css2?family=Rajdhani:wght@500;600;700&family=Share+Tech+Mono&family=Noto+Sans:wght@400;600&display=swap" rel="stylesheet">
<link rel="stylesheet" href="style.css">
</head>
<body>

<div class="login-wrap">
  <div class="login-card">
    <svg class="logo" viewBox="0 0 64 64" xmlns="http://www.w3.org/2000/svg" style="width:52px; height:52px; margin:0 auto 10px; display:block;">
      <circle cx="32" cy="32" r="30" fill="#161e29" stroke="#f5a623" stroke-width="2"/>
      <g fill="#f5a623">
        <circle cx="18" cy="24" r="6"/><rect x="12" y="30" width="12" height="16" rx="3"/>
        <circle cx="32" cy="20" r="7"/><rect x="25" y="27" width="14" height="19" rx="3"/>
        <circle cx="46" cy="24" r="6"/><rect x="40" y="30" width="12" height="16" rx="3"/>
      </g>
      <rect x="10" y="20" width="10" height="4" rx="2" fill="#4fa3e3"/>
      <rect x="24" y="15" width="12" height="4" rx="2" fill="#4fa3e3"/>
      <rect x="38" y="20" width="10" height="4" rx="2" fill="#4fa3e3"/>
    </svg>
    <h1>DEPOSIT‑11C</h1>
    <div class="sub">Attendance Management — Sign In</div>

    <form id="loginForm" autocomplete="off">
      <label>Username</label>
      <input type="text" id="username" autocapitalize="characters" placeholder="e.g. VIKRANT" required>
      <label style="margin-top:12px;">Password</label>
      <input type="password" id="password" required>
      <div id="loginError"></div>
      <button type="submit" class="btn-amber" id="loginBtn" style="width:100%; margin-top:16px;">Sign In</button>
    </form>
  </div>
</div>

<script type="module">
import { login, getSession } from "./auth.js";

const params = new URLSearchParams(window.location.search);
const redirect = params.get('redirect') || 'index.html';
const reason = params.get('reason');

// Already logged in? skip straight through.
if (getSession()) {
  window.location.href = redirect;
}

const form = document.getElementById('loginForm');
const errBox = document.getElementById('loginError');
const btn = document.getElementById('loginBtn');

if (reason === 'timeout') {
  errBox.textContent = 'You were signed out after 10 minutes of inactivity. Please sign in again.';
}

form.addEventListener('submit', async (e) => {
  e.preventDefault();
  errBox.textContent = '';
  const username = document.getElementById('username').value;
  const password = document.getElementById('password').value;
  btn.disabled = true; btn.textContent = 'Signing in...';
  try {
    await login(username, password);
    window.location.href = redirect;
  } catch (err) {
    errBox.textContent = err.message || 'Login failed.';
    btn.disabled = false; btn.textContent = 'Sign In';
  }
});
</script>

</body>
</html>
