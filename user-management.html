<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1">
<title>Password Manager — Deposit-11C</title>
<link href="https://fonts.googleapis.com/css2?family=Rajdhani:wght@500;600;700&family=Share+Tech+Mono&family=Noto+Sans:wght@400;600&display=swap" rel="stylesheet">
<link rel="stylesheet" href="style.css">
</head>
<body>

<header class="app-header">
  <div class="header-top">
    <div class="titles">
      <h1>Password Manager</h1>
      <div class="sub">Login accounts for Executives</div>
    </div>
  </div>
  <div class="header-bottom">
    <a class="back-btn" href="main-menu.html">← Home</a>
    <div class="user-badge" id="userBadge"></div>
  </div>
</header>

<div class="page">

  <div class="card">
    <h2><span class="n">＋</span> Add / Edit User</h2>
    <div class="field-row three">
      <div><label>Username</label><input type="text" id="fUsername" placeholder="e.g. RAKESH" autocapitalize="characters"></div>
      <div><label>Display Name</label><input type="text" id="fDisplayName" placeholder="Full name"></div>
      <div><label>Role</label>
        <select id="fRole">
          <option value="user">Standard User</option>
          <option value="admin">Administrator</option>
        </select>
      </div>
    </div>
    <div class="field-row two">
      <div><label>Password</label><input type="password" id="fPassword" placeholder="New / updated password"></div>
      <div><label>Confirm Password</label><input type="password" id="fPassword2" placeholder="Re-enter password"></div>
    </div>
    <div class="btn-row">
      <button class="btn-amber" id="saveUserBtn">Save User</button>
      <button class="btn-outline" id="clearFormBtn">Clear Form</button>
      <span id="formStatus" class="mono" style="font-size:0.8rem; color:var(--text-mid);"></span>
    </div>
  </div>

  <div class="card">
    <h2>👥 Existing Users</h2>
    <div id="usersHost"><div class="loader"><div class="spinner"></div> Loading...</div></div>
  </div>

</div>

<div id="toastHost"></div>

<script type="module">
import { requireAuth, requireAdmin, renderUserBadge, listUsers, saveUser, deleteUser } from "./auth.js";

const session = requireAuth();
if (session && !requireAdmin()) {
  renderUserBadge('userBadge');

  function toast(msg, ms=3200){
    const t=document.createElement('div'); t.className='toast'; t.textContent=msg;
    document.getElementById('toastHost').appendChild(t);
    setTimeout(()=>t.remove(), ms);
  }
  function esc(str){ return String(str ?? "").replace(/[&<>"']/g, c => ({"&":"&amp;","<":"&lt;",">":"&gt;",'"':"&quot;","'":"&#39;"}[c])); }

  const fUsername = document.getElementById('fUsername');
  const fDisplayName = document.getElementById('fDisplayName');
  const fRole = document.getElementById('fRole');
  const fPassword = document.getElementById('fPassword');
  const fPassword2 = document.getElementById('fPassword2');
  const formStatus = document.getElementById('formStatus');

  let editingExisting = false;

  function clearForm() {
    fUsername.value = ''; fDisplayName.value = ''; fRole.value = 'user';
    fPassword.value = ''; fPassword2.value = '';
    fUsername.disabled = false;
    editingExisting = false;
    formStatus.textContent = '';
  }
  document.getElementById('clearFormBtn').addEventListener('click', clearForm);

  async function refreshUsers() {
    const host = document.getElementById('usersHost');
    host.innerHTML = `<div class="loader"><div class="spinner"></div> Loading...</div>`;
    try {
      const users = await listUsers();
      if (users.length === 0) { host.innerHTML = `<div class="empty-state">No users yet.</div>`; return; }
      host.innerHTML = `<div class="emp-list">` + users.map(u => `
        <div class="emp-row">
          <div class="emp-name">${esc(u.displayName || u.username)} <span class="locked-tag">(${esc(u.username)})</span></div>
          <div class="controls">
            <span class="pill" style="background:${u.role==='admin' ? 'var(--amber)' : 'var(--blue)'};">${u.role==='admin'?'Administrator':'Standard User'}</span>
            <button class="btn-sm btn-outline" data-edit="${esc(u.username)}">Edit</button>
            <button class="btn-sm btn-outline" data-del="${esc(u.username)}">Delete</button>
          </div>
        </div>`).join('') + `</div>`;

      host.querySelectorAll('[data-edit]').forEach(b => b.addEventListener('click', () => {
        const u = users.find(x => x.username === b.dataset.edit);
        if (!u) return;
        fUsername.value = u.username;
        fUsername.disabled = true;
        fDisplayName.value = u.displayName || '';
        fRole.value = u.role === 'admin' ? 'admin' : 'user';
        fPassword.value = ''; fPassword2.value = '';
        editingExisting = true;
        formStatus.textContent = `Editing ${u.username} — leave password blank to keep it unchanged.`;
        window.scrollTo({ top: 0, behavior: 'smooth' });
      }));

      host.querySelectorAll('[data-del]').forEach(b => b.addEventListener('click', async () => {
        if (!confirm(`Delete user "${b.dataset.del}"? They will no longer be able to log in.`)) return;
        try {
          await deleteUser(b.dataset.del);
          toast('User deleted.');
          refreshUsers();
        } catch (e) {
          toast('Delete failed: ' + e.message, 5000);
        }
      }));
    } catch (e) {
      host.innerHTML = `<div class="empty-state" style="color:var(--red);">Error: ${esc(e.message)}</div>`;
    }
  }

  document.getElementById('saveUserBtn').addEventListener('click', async () => {
    const username = fUsername.value.trim();
    const displayName = fDisplayName.value.trim();
    const role = fRole.value;
    const password = fPassword.value;
    const password2 = fPassword2.value;

    if (!username) { toast('Enter a username.'); return; }
    if (password || password2) {
      if (password !== password2) { toast('Passwords do not match.'); return; }
    } else if (!editingExisting) {
      toast('A password is required for a new user.'); return;
    }

    try {
      const uname = await saveUser({ username, displayName, role, password });
      toast(`User "${uname}" saved.`);
      clearForm();
      refreshUsers();
    } catch (e) {
      toast('Save failed: ' + e.message, 5000);
    }
  });

  refreshUsers();
}
</script>

</body>
</html>
